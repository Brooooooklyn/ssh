[package]
edition = "2021"
name = "napi-rs_ssh"
version = "0.0.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
anyhow = "1"
dirs = "4"
napi = { version = "2", default-features = false, features = ["async", "error_anyhow"] }
napi-derive = { version = "2" }
russh = { version = "0.36", features = ["vendored-openssl"] }
russh-keys = { version = "0.24", features = ["vendored-openssl"] }
tokio = { version = "1", features = ["full"] }

[build-dependencies]
napi-build = "2"

[profile.release]
opt-level = 3
lto = 'fat'
codegen-units = 1